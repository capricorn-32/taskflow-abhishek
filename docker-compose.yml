services:
  postgres:
    image: postgres:16-alpine
    container_name: taskflow-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-taskflow}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow}"]
      interval: 5s
      timeout: 3s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: taskflow-api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      HTTP_ADDR: ":8080"
      DATABASE_URL: postgres://${POSTGRES_USER:-taskflow}:${POSTGRES_PASSWORD:-taskflow}@postgres:5432/${POSTGRES_DB:-taskflow}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:-super-secret-change-me}
      JWT_ISSUER: taskflow
      AUTO_MIGRATE: "true"
      MIGRATIONS_PATH: file://migrations
      LOG_LEVEL: info
      DEFAULT_PAGE_SIZE: 20
      MAX_PAGE_SIZE: 100
    ports:
      - "8080:8080"

  seed:
    image: postgres:16-alpine
    container_name: taskflow-seed
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_started
    environment:
      PGPASSWORD: ${POSTGRES_PASSWORD:-taskflow}
      POSTGRES_USER: ${POSTGRES_USER:-taskflow}
      POSTGRES_DB: ${POSTGRES_DB:-taskflow}
    volumes:
      - ./scripts:/scripts:ro
    entrypoint: ["/bin/sh", "-c"]
    command: >
      "psql -h postgres -U ${POSTGRES_USER:-taskflow} -d ${POSTGRES_DB:-taskflow} -f /scripts/seed.sql"
    restart: "no"

volumes:
  pgdata:
