basePath: /
definitions:
  internal_httpapi.AuthResponse:
    properties:
      token:
        example: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...
        type: string
      user:
        $ref: '#/definitions/internal_httpapi.UserResponse'
    type: object
  internal_httpapi.ErrorResponse:
    properties:
      error:
        type: string
      fields:
        additionalProperties:
          type: string
        type: object
    type: object
  internal_httpapi.HealthResponse:
    properties:
      status:
        example: ok
        type: string
    type: object
  internal_httpapi.LoginRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      password:
        example: password123
        type: string
    type: object
  internal_httpapi.ProjectDetailResponse:
    properties:
      created_at:
        type: string
      description:
        example: Q2 redesign project
        type: string
      id:
        example: 22222222-2222-2222-2222-222222222222
        type: string
      name:
        example: Website Redesign
        type: string
      owner_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      tasks:
        items:
          $ref: '#/definitions/taskflow_backend_internal_repository.Task'
        type: array
    type: object
  internal_httpapi.ProjectListResponse:
    properties:
      projects:
        items:
          $ref: '#/definitions/taskflow_backend_internal_repository.Project'
        type: array
    type: object
  internal_httpapi.ProjectStatsResponse:
    properties:
      by_assignee:
        additionalProperties:
          type: integer
        type: object
      by_status:
        additionalProperties:
          type: integer
        type: object
    type: object
  internal_httpapi.ProjectUpsertRequest:
    properties:
      description:
        example: Q2 redesign project
        type: string
      name:
        example: Website Redesign
        type: string
    type: object
  internal_httpapi.RegisterRequest:
    properties:
      email:
        example: jane@example.com
        type: string
      name:
        example: Jane Doe
        type: string
      password:
        example: password123
        type: string
    type: object
  internal_httpapi.TaskCreateRequest:
    properties:
      assignee_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      description:
        example: Build first draft with mobile variant
        type: string
      due_date:
        example: "2026-04-30"
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        example: high
        type: string
      status:
        enum:
        - todo
        - in_progress
        - done
        example: todo
        type: string
      title:
        example: Design home page
        type: string
    type: object
  internal_httpapi.TaskListResponse:
    properties:
      tasks:
        items:
          $ref: '#/definitions/taskflow_backend_internal_repository.Task'
        type: array
    type: object
  internal_httpapi.TaskUpdateRequest:
    properties:
      assignee_id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      description:
        example: Update mockups and spacing
        type: string
      due_date:
        example: "2026-05-15"
        type: string
      priority:
        enum:
        - low
        - medium
        - high
        example: medium
        type: string
      status:
        enum:
        - todo
        - in_progress
        - done
        example: in_progress
        type: string
      title:
        example: Design dashboard
        type: string
    type: object
  internal_httpapi.UserResponse:
    properties:
      email:
        example: jane@example.com
        type: string
      id:
        example: 11111111-1111-1111-1111-111111111111
        type: string
      name:
        example: Jane Doe
        type: string
    type: object
  taskflow_backend_internal_repository.Project:
    properties:
      created_at:
        type: string
      description:
        type: string
      id:
        type: string
      name:
        type: string
      owner_id:
        type: string
    type: object
  taskflow_backend_internal_repository.Task:
    properties:
      assignee_id:
        type: string
      created_at:
        type: string
      creator_id:
        type: string
      description:
        type: string
      due_date:
        type: string
      id:
        type: string
      priority:
        type: string
      project_id:
        type: string
      status:
        type: string
      title:
        type: string
      updated_at:
        type: string
    type: object
info:
  contact: {}
  description: |-
    TaskFlow backend API for authentication, projects, and task management.

    Validation errors return `400` with `{ "error": "validation failed", "fields": { ... } }`.
    For protected endpoints, the Authorization header must be: `Bearer <JWT_TOKEN>`.
    In Swagger UI Authorize dialog, paste the value exactly as `Bearer <JWT_TOKEN>`.
  title: TaskFlow API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: |-
        Authenticates user credentials and returns a JWT token.
        Validation rules: `email` and `password` are required.
      parameters:
      - description: Login payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      summary: Login user
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: |-
        Creates a user account and returns a JWT token.
        Validation rules: `name` and `email` are required, `password` must be at least 8 characters.
      parameters:
      - description: Registration payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/internal_httpapi.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      summary: Register a new user
      tags:
      - Auth
  /health:
    get:
      description: Returns service liveness status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.HealthResponse'
      summary: Health check
      tags:
      - Health
  /projects:
    get:
      consumes:
      - application/json
      description: |-
        Lists projects where the current user is an owner, assignee, or task creator.
        Pagination: `page` and `limit` must be positive integers. `limit` is clamped to server max.
      parameters:
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.ProjectListResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List projects
      tags:
      - Projects
    post:
      consumes:
      - application/json
      description: |-
        Creates a project with current user as owner.
        Validation rules: `name` is required and trimmed.
      parameters:
      - description: Project payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.ProjectUpsertRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/taskflow_backend_internal_repository.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create project
      tags:
      - Projects
  /projects/{id}:
    delete:
      consumes:
      - application/json
      description: |-
        Deletes a project and all tasks under it.
        Authorization: only project owner can delete.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete project
      tags:
      - Projects
    get:
      consumes:
      - application/json
      description: |-
        Returns project details and tasks for an accessible project.
        Behavior: returns `404` for malformed/non-existent IDs and `403` when user has no access.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.ProjectDetailResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Get project details
      tags:
      - Projects
    patch:
      consumes:
      - application/json
      description: |-
        Updates project name and description.
        Authorization: only project owner can update. `name` is required.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Project payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.ProjectUpsertRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/taskflow_backend_internal_repository.Project'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update project
      tags:
      - Projects
  /projects/{id}/stats:
    get:
      consumes:
      - application/json
      description: Returns aggregate counts by task status and assignee.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.ProjectStatsResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Project task statistics
      tags:
      - Projects
  /projects/{id}/tasks:
    get:
      consumes:
      - application/json
      description: |-
        Lists tasks for an accessible project with optional status/assignee filters.
        Validation: `status` must be one of `todo|in_progress|done`; `assignee` must be UUID when provided.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Task status
        enum:
        - todo
        - in_progress
        - done
        in: query
        name: status
        type: string
      - description: Assignee user ID
        format: uuid
        in: query
        name: assignee
        type: string
      - default: 1
        description: Page number
        in: query
        name: page
        type: integer
      - default: 20
        description: Page size
        in: query
        name: limit
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/internal_httpapi.TaskListResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: List tasks in project
      tags:
      - Tasks
    post:
      consumes:
      - application/json
      description: |-
        Creates a task inside a project.
        Defaults: `status=todo`, `priority=medium` if omitted.
        Validation: `title` required; `status` in `todo|in_progress|done`; `priority` in `low|medium|high`; `due_date` in `YYYY-MM-DD`.
      parameters:
      - description: Project ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Task payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.TaskCreateRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/taskflow_backend_internal_repository.Task'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Create task
      tags:
      - Tasks
  /tasks/{id}:
    delete:
      consumes:
      - application/json
      description: |-
        Deletes a task.
        Authorization: only project owner or task creator can delete.
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      produces:
      - application/json
      responses:
        "204":
          description: No Content
          schema:
            type: string
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Delete task
      tags:
      - Tasks
    patch:
      consumes:
      - application/json
      description: |-
        Partially updates task fields.
        Authorization: only project owner or task creator can update.
        Validation: if provided, `title` cannot be empty, `status` and `priority` must be valid enums, `due_date` must be `YYYY-MM-DD`.
      parameters:
      - description: Task ID
        format: uuid
        in: path
        name: id
        required: true
        type: string
      - description: Partial task payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/internal_httpapi.TaskUpdateRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/taskflow_backend_internal_repository.Task'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/internal_httpapi.ErrorResponse'
      security:
      - BearerAuth: []
      summary: Update task
      tags:
      - Tasks
schemes:
- http
securityDefinitions:
  BearerAuth:
    description: 'Required format: `Bearer <JWT_TOKEN>`.'
    in: header
    name: Authorization
    type: apiKey
swagger: "2.0"
